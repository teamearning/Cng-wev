<script>
 function sendOTP() {
        var phone = $('input[name="phone"]').val().trim();
        if (!phone) {
            notify("error", "Please enter your phone number first.");
            return;
        }
    
        const $button = $('[name="send_otp"]');
        $button.prop("disabled", true).css({ "opacity": "0.6", "cursor": "not-allowed" }).text("Sending...");
    
        $.get(`/send_otp.php?phone=${encodeURIComponent(phone)}`, function(response) {
            try {
                response = JSON.parse(response);
            } catch (e) {
                notify("error", "Invalid response from OTP server.");
                resetButton();
                return;
            }
    
            if (response.success) {
                notify("success", "OTP sent successfully!");
                $("#otp").focus();
    
                // start countdown
                let timeLeft = 60;
                $button.text(`${timeLeft}s`);
                const timerId = setInterval(() => {
                    timeLeft--;
                    $button.text(`${timeLeft}s`);
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        resetButton();
                    }
                }, 1000);
    
                function resetButton() {
                    $button.prop("disabled", false).css({ "opacity": "1", "cursor": "pointer" }).text("Send");
                }
    
            } else {
                notify("error", response.error?.message || "Failed to send OTP.");
                resetButton();
            }
        });
    }
    
    
    function verifyOTP() {
        
        var phone = $('input[name="phone"]').val().trim();
        var name = $('input[name="name"]').val().trim();
        var password = $('input[name="password"]').val().trim();
        var code = $('input[name="code"]').val().trim();
        var token = "hu0kLTnZD8cP7sywTotDXTh4bVlyQ3ZyM25BdFFwc3p0YnU3bVE9PQ==";
         
        
        
        if (!phone || !name || !password) {
            notify("error", "Enter Full Details ");
            return;
        }
        
        // $("#create-account-btn").prop("disabled", true).text("Verifying...");
    
        $.ajax({
            url: '/verify_otp.php',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ phone, name, password, code, token }),
            success: function(response) {
                // Ensure response is parsed
                try {
                    response = typeof response === "string" ? JSON.parse(response) : response;
                } catch (e) {
                    notify("error", "Invalid response from server.");
                    // $("#create-account-btn").prop("disabled", false).text("Verify & Register");
                    return;
                }
    
                // Handle success
                if (response.status === "success") {
                    notify("success", response.msg || "OTP registration successful!");
                    setTimeout(() => window.location.href = "/home/login", 1000);
                } else {
                    // Handle error from server
                    notify("error", response.msg || "OTP verification or registration failed.");
                    $("#create-account-btn").prop("disabled", false).text("Verify & Register");
                }
            },
            error: function() {
                notify("error", "Server error during verification/registration.");
                $("#create-account-btn").prop("disabled", false).text("Verify & Register");
            }
        });
    }

    function onRequestResponse(response)
    {
       if(response.status == "success")
       {
           notify("success",response.msg);
        //   setTimeout(() => {
        //       navigate("/home/login");
        //   },1500);
          
          navigate("/home/verify",true);
       }else{
          notify("error",response.msg);
       }
    }
</script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('input, select, textarea').forEach(function (element) {
            element.oninvalid = function (event) {
                event.preventDefault();
                notify('error', this.validationMessage);
            };
            element.oninput = function () {
                this.setCustomValidity('');
            };
        });
        
        window.scrollTo(0, 0);
        
    });


    function closeIframe() {
        var popup = document.getElementById("popup");
        var iframe = document.getElementById("youtubeVideo");
        iframe.src = iframe.src;
        popup.style.display = "none";
    }

    window.addEventListener("popstate", function (event) {
        location.reload();
    });

    function convertAllFormToAjax() {
        document.querySelectorAll("form").forEach((form) => {
            form.onsubmit = (e) => {
                form.querySelector("button[type=submit]").disabled = true;
                let buttonText = form.querySelector("button[type=submit]").innerHTML;
                form.querySelector("button[type=submit]").innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>';
                e.preventDefault();
                const formData = $(form).serializeArray();
                const jsonData = {};
                formData.forEach(field => {
                    jsonData[field.name] = field.value;
                });
                $.ajax({
                    url: form.action,
                    method: form.method,
                    contentType: 'application/json',
                    data: JSON.stringify(jsonData),
                    success: function (response) {
                        try {
                            onRequestResponse(response);
                        } catch (e) { console.log("error", e); }
                        form.querySelector("button[type=submit]").disabled = false;
                        form.querySelector("button[type=submit]").innerHTML = buttonText;
                    },
                    error: function (xhr, status, error) {
                        try {
                            onRequestError(error);
                        } catch (e) { console.log("error", e); }
                        form.querySelector("button[type=submit]").disabled = false;
                        form.querySelector("button[type=submit]").innerHTML = buttonText;
                    }
                });
            };
        });
    }

    function notify(status, msg) {
        if (status == "success") {
            Toastify({
                text: `<span style="display:flex; align-items: center; color: #000;">
                          <i class="fas fa-check-circle" style="margin-right: 0.5rem; color: #3cba54;"></i>${msg}
                       </span>`,
                duration: 3000,
                gravity: "top",
                backgroundColor: "#fff",
                escapeMarkup: false
            }).showToast();
        }

        if (status == "error") {
            Toastify({
                text: `<span style="display:flex; align-items: center; color: #000;">
                          <i class="fas fa-times-circle" style="margin-right: 0.5rem; color: #db2828;"></i>${msg}
                       </span>`,
                duration: 3000,
                gravity: "top",
                backgroundColor: "#fff",
                escapeMarkup: false
            }).showToast();
        }
    }

    window.first = false;
    
    const dbName = 'AppCacheDB';
    const dbVersion = 1;
    const storeName = 'pages';
    let db;

    function openIndexedDB(callback) {
        const request = indexedDB.open(dbName, dbVersion);

        request.onupgradeneeded = function (event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: 'path' });
            }
        };

        request.onsuccess = function (event) {
            db = event.target.result;
            if (callback) callback();
        };

        request.onerror = function (event) {
            console.error("IndexedDB error:", event.target.errorCode);
        };
    }

    function savePageToIndexedDB(path, data) {
        if (!db) return;

        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        const item = {
            path,
            data,
            timestamp: Date.now()
        };
        store.put(item);
    }

    function getPageFromIndexedDB(path, callback) {
        if (!db) {
            callback(null);
            return;
        }

        const tx = db.transaction([storeName], 'readonly');
        const store = tx.objectStore(storeName);
        const request = store.get(path);

        request.onsuccess = function (event) {
            callback(event.target.result);
        };

        request.onerror = function (event) {
            console.error("Error reading IndexedDB:", event.target.errorCode);
            callback(null);
        };
    }

    function cleanupIndexedDB(maxEntries = 20) {
        if (!db) return;

        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        const items = [];

        store.openCursor().onsuccess = function (event) {
            const cursor = event.target.result;
            if (cursor) {
                items.push(cursor.value);
                cursor.continue();
            } else {
                if (items.length > maxEntries) {
                    const excess = items.sort((a, b) => a.timestamp - b.timestamp)
                                        .slice(0, items.length - maxEntries);
                    excess.forEach(item => store.delete(item.path));
                }
            }
        };
    }

    function staleWhileRevalidate(path, callback) {
        const ttl = 7 * 24 * 60 * 60 * 1000; // 7 days

        getPageFromIndexedDB(path, function (cacheItem) {
            const now = Date.now();
            const isValid = cacheItem && now - cacheItem.timestamp < ttl;

            if (isValid) {
                callback(cacheItem.data);
            }

            let postData = { turbo: "1" };
            if (window.first) {
                postData.first = 1;
                window.first = false;
            }

            $.get(path, postData, (fresh) => {
                if (!isValid || fresh !== cacheItem?.data) {
                    savePageToIndexedDB(path, fresh);
                    cleanupIndexedDB();
                    callback(fresh);
                }
            });
        });
    }

    // Initialize IndexedDB
    openIndexedDB(() => {
        console.log("IndexedDB ready");
    });
    
    function cleanupCache(maxEntries = 20) {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('swrcache-'));
    
        if (keys.length <= maxEntries) return;
    
        const sorted = keys.map(k => ({
            key: k,
            timestamp: (() => {
                try {
                    return JSON.parse(localStorage.getItem(k)).timestamp || 0;
                } catch {
                    return 0;
                }
            })()
        })).sort((a, b) => a.timestamp - b.timestamp);
    
        const excess = sorted.length - maxEntries;
        for (let i = 0; i < excess; i++) {
            localStorage.removeItem(sorted[i].key);
        }
    }

    window.navRequestId = window.navRequestId || 0;
    
    function navigate(path, complete = true) {
        window.navRequestId++;
        const currentId = window.navRequestId;
    
        document.body.classList.add("content-updating");
    
        setTimeout(() => {
            if (currentId !== window.navRequestId) return;
    
            staleWhileRevalidate(path, function (data) {
                if (currentId !== window.navRequestId) return;
    
                try {
                    if (complete) {
                        loadFromCache(data, complete, path);
                        window.scrollTo(0, 0); 
                    } else {
                        const container = document.querySelector("#innerBody");
                        if (container) {
                            container.innerHTML = data;
                            executeComponentScript();
                            convertAllFormToAjax();
                            window.scrollTo(0, 0); 
                        }
                    }
    
                    const pageHasContent = document.querySelector("#innerBody")?.innerText.trim().length > 0;
    
                    if (!pageHasContent) {
                        console.warn("Navigation succeeded but page content is empty.");
                    }
                } catch (err) {
                    console.error("Navigation/rendering error:", err);
                    notify("error", "Failed to load content.");
                }
    
                document.body.classList.remove("content-updating");
            });
        }, 200); 
    }

    function loadFromCache(data, complete, path) {
        if (complete) {
            document.documentElement.innerHTML = data;
            $("#loader").hide();
            setTimeout(() => {
                document.querySelectorAll("script").forEach((old_script) => {
                    let script = document.createElement("script");
                    if (old_script.src != "") {
                        script.src = old_script.src;
                        old_script.remove();
                        document.body.append(script);
                    } else {
                        if (old_script.className != "afterLoadScript") {
                            script.innerHTML = old_script.innerHTML;
                            document.body.append(script);
                            old_script.remove();
                        }
                    }
                });

                document.querySelectorAll("link").forEach((old_link) => {
                    let link = document.createElement("link");
                    link.href = old_link.href;
                    link.rel = "stylesheet";
                    old_link.remove();
                    document.head.append(link);
                });

                executeComponentScript();
                convertAllFormToAjax();
                try { $('#preloader').hide(); } catch (e) { }
            }, 50);
        } else {
            document.querySelector("#innerBody").innerHTML = data;
            executeComponentScript();
            convertAllFormToAjax();
        }

        history.pushState({}, "", path);
    }

    function closeDropdown(ele) {
        ele.parentElement.parentElement.className = ele.parentElement.parentElement.className.replace("show", "");
    }

    function activeNavigation(ele) {
        $(".side-menu__item").removeClass("active");
        ele.className = 'side-menu__item active';
        if (document.documentElement.clientWidth <= 992) {
            document.querySelector("html").setAttribute("data-toggled", "close");
            document.querySelector("#responsive-overlay").className = '';
        }
    }

    window.onload = function () {
        executeComponentScript();
        convertAllFormToAjax();
    }

    function executeComponentScript() {
        let scriptComponent = document.querySelector('.afterLoadScript');
        if (scriptComponent) {
            try {
                eval(scriptComponent.innerHTML);
            } catch (e) { console.log("Error", e); }
        }
    }
</script>
